services:
  - type: web
    name: revista-app
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: revista-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: revista-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: revista-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: revista-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: revista-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: revista-db
    plan: free
    databaseName: revista
    user: revista
